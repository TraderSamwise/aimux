name: update-homebrew-tap

on:
  release:
    types: [published]

jobs:
  bump-formula:
    name: Bump aimux formula
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          assets=(
            aimux-darwin-arm64.tar.gz.sha256
            aimux-darwin-x64.tar.gz.sha256
            aimux-linux-arm64.tar.gz.sha256
            aimux-linux-x64.tar.gz.sha256
          )
          for i in $(seq 1 60); do
            missing=0
            for a in "${assets[@]}"; do
              if ! gh release view "$TAG" --repo "$OWNER_REPO" --json assets \
                   --jq ".assets[].name" | grep -qx "$a"; then
                missing=1
                break
              fi
            done
            if [ "$missing" -eq 0 ]; then
              echo "All sha256 assets present."
              exit 0
            fi
            echo "Waiting for release assets... ($i/60)"
            sleep 10
          done
          echo "Timed out waiting for release assets." >&2
          exit 1

      - name: Download sha256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p sha
          for a in aimux-darwin-arm64 aimux-darwin-x64 aimux-linux-arm64 aimux-linux-x64; do
            gh release download "$TAG" --repo "$OWNER_REPO" \
              --pattern "${a}.tar.gz.sha256" --dir sha --clobber
          done

      - name: Extract SHA values
        id: sha
        run: |
          set -euo pipefail
          extract() {
            awk '{print $1}' "sha/$1.tar.gz.sha256"
          }
          {
            echo "darwin_arm64=$(extract aimux-darwin-arm64)"
            echo "darwin_x64=$(extract aimux-darwin-x64)"
            echo "linux_arm64=$(extract aimux-linux-arm64)"
            echo "linux_x64=$(extract aimux-linux-x64)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-aimux
        uses: actions/checkout@v4
        with:
          repository: TraderSamwise/homebrew-aimux
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite formula
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          set -euo pipefail
          cat > tap/Formula/aimux.rb <<EOF
          class Aimux < Formula
            desc "Native CLI agent multiplexer — run AI coding tools with their native TUIs intact"
            homepage "https://github.com/TraderSamwise/aimux"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-darwin-x64.tar.gz"
                sha256 "${DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-linux-x64.tar.gz"
                sha256 "${LINUX_X64}"
              end
            end

            depends_on "node"
            depends_on "tmux"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"bin/aimux"
            end

            test do
              assert_match "aimux", shell_output("#{bin}/aimux --help 2>&1", 0)
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/aimux.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git add Formula/aimux.rb
          git commit -m "aimux ${TAG}"
          git push
