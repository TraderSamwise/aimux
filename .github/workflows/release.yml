name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-assets:
    name: Build release assets
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
          - platform: linux
            arch: arm64
            runner: ubuntu-latest
          - platform: darwin
            arch: x64
            runner: macos-latest
          - platform: darwin
            arch: arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            app/yarn.lock

      - run: corepack enable

      - run: yarn install --frozen-lockfile

      - run: yarn --cwd app install --frozen-lockfile

      - run: yarn verify

      - name: Build release asset
        run: yarn release:asset
        env:
          AIMUX_RELEASE_PLATFORM: ${{ matrix.platform }}
          AIMUX_RELEASE_ARCH: ${{ matrix.arch }}

      - name: Verify release asset has no source maps
        run: |
          set -euo pipefail
          ASSET="release/aimux-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          if tar -tzf "$ASSET" | grep -E '(^|/)[^/]+\.map$'; then
            echo "Release asset contains source maps." >&2
            exit 1
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/aimux-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            release/aimux-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release-assets
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            app/yarn.lock
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1 && npm --version

      - run: yarn install --frozen-lockfile

      - run: yarn --cwd app install --frozen-lockfile

      - name: Verify package.json version matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="${TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($EXPECTED)" >&2
            exit 1
          fi

      - run: yarn build:release

      - name: Verify npm package has no source maps
        run: |
          set -euo pipefail
          npm pack --dry-run --json > npm-pack.json
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('npm-pack.json', 'utf8');
          const jsonStart = raw.lastIndexOf('\n[');
          const json = jsonStart >= 0 ? raw.slice(jsonStart + 1) : raw;
          const pack = JSON.parse(json)[0];
          const maps = pack.files
            .map((file) => file.path)
            .filter((path) => path.endsWith('.map'));
          if (maps.length > 0) {
            console.error('npm package contains source maps:');
            for (const path of maps) console.error(`- ${path}`);
            process.exit(1);
          }
          NODE

      - run: npm publish --access public --provenance

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release-assets
    steps:
      - name: Resolve version
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download sha256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p sha
          for a in aimux-darwin-arm64 aimux-darwin-x64 aimux-linux-arm64 aimux-linux-x64; do
            gh release download "$TAG" --repo "$OWNER_REPO" \
              --pattern "${a}.tar.gz.sha256" --dir sha --clobber
          done

      - name: Extract SHA values
        id: sha
        run: |
          set -euo pipefail
          extract() {
            awk '{print $1}' "sha/$1.tar.gz.sha256"
          }
          {
            echo "darwin_arm64=$(extract aimux-darwin-arm64)"
            echo "darwin_x64=$(extract aimux-darwin-x64)"
            echo "linux_arm64=$(extract aimux-linux-arm64)"
            echo "linux_x64=$(extract aimux-linux-x64)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-aimux
        uses: actions/checkout@v4
        with:
          repository: TraderSamwise/homebrew-aimux
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite formula
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          set -euo pipefail
          cat > tap/Formula/aimux.rb <<EOF
          class Aimux < Formula
            desc "Native CLI agent multiplexer — run AI coding tools with their native TUIs intact"
            homepage "https://github.com/TraderSamwise/aimux"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-darwin-x64.tar.gz"
                sha256 "${DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/TraderSamwise/aimux/releases/download/${TAG}/aimux-linux-x64.tar.gz"
                sha256 "${LINUX_X64}"
              end
            end

            depends_on "node"
            depends_on "tmux"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"bin/aimux"
            end

            test do
              assert_match "aimux", shell_output("#{bin}/aimux --help 2>&1", 0)
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/aimux.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git add Formula/aimux.rb
          git commit -m "aimux ${TAG}"
          git push
