name = "aimux-relay"
main = "src/index.ts"
account_id = "14238866831e48d4eaf3aab8f6d30272"
compatibility_date = "2025-05-19"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "RELAY", class_name = "RelayObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayObject"]

[env.production]
name = "aimux-relay"
routes = [
  { pattern = "relay.aimux.app", custom_domain = true }
]

[env.production.vars]
CLI_TOKEN_ALLOWED_ORIGINS = "https://aimux.app,https://www.aimux.app"
SECURITY_ACTION_BASE_URL = "https://relay.aimux.app"
# MVP default: record and alert on first-time devices without blocking them.
# Switch to "enforce" after a device approval UI/flow is available.
SECURITY_DEVICE_POLICY = "warn"
SECURITY_EMAIL_FROM = "aimux security <security@aimux.app>"
COLLAB_EMAIL_FROM = "aimux invites <invites@aimux.app>"
SHARE_INVITE_BASE_URL = "https://aimux.app"

[env.production.durable_objects]
bindings = [
  { name = "RELAY", class_name = "RelayObject" }
]
