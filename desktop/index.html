<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aimux Desktop</title>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="eyebrow">Aimux</div>
          <h1>Desktop Shell</h1>
          <p>TUI-first orchestration with a native session browser.</p>
        </div>
        <div class="toolbar">
          <button id="refresh-projects" class="button button-secondary" type="button">Refresh</button>
        </div>
        <section class="project-pane">
          <div class="section-label">Projects</div>
          <div id="project-list" class="project-list"></div>
        </section>
      </aside>
      <main class="workspace">
        <header class="workspace-header">
          <div>
            <div id="project-title" class="workspace-title">Select a project</div>
            <div id="project-subtitle" class="workspace-subtitle">No project selected.</div>
          </div>
          <div class="workspace-actions">
            <button id="open-dashboard" class="button" type="button" disabled>Open dashboard</button>
          </div>
        </header>
        <section class="workspace-body">
          <section class="session-panel">
            <div class="section-label">Sessions</div>
            <div id="session-list" class="session-list empty-state">Select a project to view sessions.</div>
          </section>
          <section class="terminal-panel">
            <div class="terminal-header">
              <div class="section-label">Terminal</div>
              <div id="terminal-status" class="terminal-status">Idle</div>
            </div>
            <div id="terminal" class="terminal"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
